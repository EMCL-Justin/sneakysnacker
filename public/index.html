<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e0e12; color: #e0e0e0; font-family: monospace; padding: 24px; }
    h1 { color: #c79c6e; margin-bottom: 4px; font-size: 1.2rem; }
    .sub { color: #666; font-size: 0.8rem; margin-bottom: 24px; }
    .add-form { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    input, select {
      background: #1a1a22; border: 1px solid #333; color: #e0e0e0;
      padding: 8px 12px; font-family: monospace; font-size: 0.9rem; border-radius: 4px;
    }
    input::placeholder { color: #555; }
    .name-input { flex: 2; min-width: 130px; }
    .realm-input { flex: 2; min-width: 130px; }
    select { flex: 1; min-width: 90px; }
    button {
      background: #c79c6e; color: #0e0e12; border: none; padding: 8px 16px;
      font-family: monospace; font-weight: bold; cursor: pointer; border-radius: 4px;
    }
    button:hover { background: #d4a96e; }
    button.remove { background: #222; color: #666; font-size: 0.8rem; padding: 4px 10px; border: 1px solid #333; }
    button.remove:hover { background: #c0392b; color: #fff; border-color: #c0392b; }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { text-align: left; color: #555; padding: 6px 12px; border-bottom: 1px solid #1a1a22; font-weight: normal; }
    td { padding: 10px 12px; border-bottom: 1px solid #161619; vertical-align: middle; }
    tr:hover td { background: #111116; }

    .type-tag {
      display: inline-block; font-size: 0.7rem; font-weight: bold;
      padding: 2px 7px; border-radius: 3px; letter-spacing: 0.05em;
    }
    .type-target { background: #1a2e1a; color: #2ecc71; }
    .type-avoid  { background: #2e1a1a; color: #e74c3c; }

    .brackets { display: flex; gap: 4px; flex-wrap: wrap; }
    .bracket-pill {
      font-size: 0.72rem; padding: 2px 7px; border-radius: 3px;
      background: #1a1a22; color: #666; border: 1px solid #2a2a33;
    }
    .bracket-pill.active-5v5 { background: #2e2a12; color: #f1c40f; border-color: #4a4218; }
    .bracket-pill.active-3v3 { background: #122e18; color: #2ecc71; border-color: #1a4a24; }
    .bracket-pill.active-2v2 { background: #1a1a22; color: #888;    border-color: #2a2a33; }

    .rating { color: #c79c6e; font-weight: bold; }
    .realm  { color: #666; font-size: 0.8rem; }
    .last-seen { color: #444; font-size: 0.8rem; }
    .last-seen.active { color: #2ecc71; }
    .empty  { color: #333; padding: 24px 12px; }
    .status { color: #333; font-size: 0.75rem; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>Arena Tracker</h1>
  <p class="sub">Pings Discord when a watched player's rating changes — all brackets</p>

  <div class="add-form">
    <input id="name"  class="name-input"  placeholder="Character name" />
    <input id="realm" class="realm-input" placeholder="Realm (e.g. nightslayer)" />
    <select id="type">
      <option value="target">🎯 Target</option>
      <option value="avoid">⚠️ Avoid</option>
    </select>
    <button onclick="addPlayer()">Watch</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Player</th>
        <th>Type</th>
        <th>Brackets seen</th>
        <th>Best rating</th>
        <th>Last activity</th>
        <th>@here</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="players"></tbody>
  </table>

  <p class="status" id="status"></p>

  <script>
    async function load() {
      const [players, status] = await Promise.all([
        fetch("/api/players").then(r => r.json()),
        fetch("/api/status").then(r => r.json()),
      ]);

      const tbody = document.getElementById("players");
      if (!players.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty">No players watched yet.</td></tr>`;
        document.getElementById("status").textContent = `source: xunamate · polling every ${status.pollIntervalMinutes}min`;
        return;
      }

      tbody.innerHTML = players.map(p => {
        const typeTag = p.type === "avoid"
          ? `<span class="type-tag type-avoid">AVOID</span>`
          : `<span class="type-tag type-target">TARGET</span>`;

        const brackets = ["5v5", "3v3", "2v2"].map(b => {
          const snap = p.bracketData?.[b];
          const cls = snap ? `bracket-pill active-${b}` : "bracket-pill";
          const label = snap ? `${b} · ${snap.rating}` : b;
          return `<span class="${cls}">${label}</span>`;
        }).join("");

        const allSnaps = ["5v5","3v3","2v2"].map(b => p.bracketData?.[b]).filter(Boolean);
        const lastSeen = allSnaps.length
          ? timeAgo(allSnaps.sort((a,b) => new Date(b.last_seen)-new Date(a.last_seen))[0].last_seen)
          : "never seen";
        const recentlyActive = allSnaps.some(s => Date.now() - new Date(s.last_seen) < 5 * 60 * 1000);

        return `
          <tr>
            <td>
              ${p.name}<span class="realm"> — ${p.realm_slug}</span>
            </td>
            <td>${typeTag}</td>
            <td><div class="brackets">${brackets}</div></td>
            <td class="rating">${p.rating ?? "—"}</td>
            <td class="last-seen ${recentlyActive ? "active" : ""}">${lastSeen}</td>
            <td>
              <input type="checkbox" ${p.ping ? "checked" : ""}
                onchange="togglePing(${p.id}, this.checked)" title="@here ping on alert" />
            </td>
            <td><button class="remove" onclick="remove(${p.id})">remove</button></td>
          </tr>`;
      }).join("");

      document.getElementById("status").textContent =
        `source: xunamate · polling every ${status.pollIntervalMinutes}min · ${status.watchedCount} watched`;
    }

    async function addPlayer() {
      const name  = document.getElementById("name").value.trim();
      const realm = document.getElementById("realm").value.trim().toLowerCase();
      const type  = document.getElementById("type").value;
      if (!name || !realm) return;

      const res = await fetch("/api/players", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, realm_slug: realm, type }),
      });

      if (res.ok) {
        document.getElementById("name").value = "";
        document.getElementById("realm").value = "";
        load();
      } else {
        alert((await res.json()).error);
      }
    }

    async function togglePing(id, enabled) {
      await fetch(`/api/players/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ping: enabled }),
      });
    }

    async function remove(id) {
      await fetch(`/api/players/${id}`, { method: "DELETE" });
      load();
    }

    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso);
      const m = Math.floor(diff / 60000);
      if (m < 1) return "just now";
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }

    document.getElementById("name").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("realm").focus();
    });
    document.getElementById("realm").addEventListener("keydown", e => {
      if (e.key === "Enter") addPlayer();
    });

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
